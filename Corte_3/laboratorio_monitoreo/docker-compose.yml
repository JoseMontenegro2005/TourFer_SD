services:
  pedidos:
    build: ./Pedidos
    ports:
      - "5001:5000"

  inventario:
    build: ./Inventario
    ports:
      - "5002:5000"

  pagos:
    build: ./Pagos
    ports:
      - "5003:5000"

  gateway:
    build: ./Gateway
    ports:
      - "5000:5000"
    depends_on:
      - pedidos
      - inventario
      - pagos